<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Le Zoo Interactif</title>
    <!-- Lien vers une feuille de style pour le design -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <h1>Mon Zoo Interactif</h1>
    <div id="zoo">
        <div class="animal" id="lion">
            <img src="assets/pictures/lion.jpg" alt="Lion">
            <p>Lion</p>
        </div>
        <div class="animal" id="elephant">
            <img src="assets/pictures/elephant.jpg" alt="Éléphant">
            <p>Éléphant</p>
        </div>
        <div class="animal" id="girafe">
            <img src="assets/pictures/girafe.jpg" alt="Girafe">
            <p>Girafe</p>
        </div>
    </div>
    <div id="nourriture">
        <h2>Nourriture disponible : <span id="compteur">3</span></h2>
        <button id="button">Ajouter de la nourriture</button>
    </div>
    <div id="infos">
        <h2>Informations</h2>
        <p id="message">Cliquez sur un animal pour le nourrir !</p>
    </div>
    <!-- Script JavaScript -->
    <script src="assets/scripts/script.js"></script>
</body>

</html>
